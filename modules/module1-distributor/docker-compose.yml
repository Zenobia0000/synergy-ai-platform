services:
  postgres:
    image: postgres:16-alpine
    container_name: content_distributor_db
    environment:
      POSTGRES_DB: content_distributor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: content_distributor_n8n
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=postgres
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-postgres}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin}
      # Allow workflow expressions ({{ $env.XXX }}) to read env vars.
      # Safe for single-user local dev; in multi-tenant deployments keep true.
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Webhook secret — must match backend/.env N8N_WEBHOOK_SECRET
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      # Instagram Graph API credentials (consumed by publish_main workflow)
      - IG_ACCESS_TOKEN=${IG_ACCESS_TOKEN}
      - IG_USER_ID=${IG_USER_ID}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: content_distributor_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot service: creates the bucket on first run, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: content_distributor_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-content-images};
      echo 'MinIO bucket ready: ${MINIO_BUCKET:-content-images}';
      exit 0;
      "
    restart: "no"

volumes:
  postgres_data:
  n8n_data:
  minio_data:
